# Render Blueprint for the EvoFit AI backend + a managed Postgres instance.
# Deploy: connect this repo in the Render dashboard, "New +" -> "Blueprint",
# point it at this file. See DEPLOYMENT_GUIDE.md for the full walkthrough
# (including using Neon instead of Render's managed Postgres).
databases:
  - name: evofit-ai-db
    plan: free
    databaseName: evofit
    user: evofit

services:
  - type: web
    name: evofit-ai-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: evofit-ai-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: CORS_ORIGINS
        sync: false # set to your deployed Vercel frontend URL after first deploy
      - key: TRUSTED_HOSTS
        sync: false # set to your *.onrender.com domain (and custom domain, if any)
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: AUTH_RATE_LIMIT
        value: "10/minute"
      - key: CLAUDE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
