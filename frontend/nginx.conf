server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip already-compressible static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Cache hashed static assets aggressively; index.html is not hashed and
    # must always be revalidated so deploys are picked up immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any unmatched path serves index.html so React Router
    # (not nginx) decides whether it's a real route or the 404 page.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
